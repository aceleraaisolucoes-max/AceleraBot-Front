# Azure DevOps — Espelhamento para o GitHub (Frontend AceleraBot)
#
# A cada push na main, empurra o código para um repositório-espelho no GitHub.
# A Vercel fica conectada a ESSE repo do GitHub e faz o deploy automaticamente.
# Você continua commitando apenas no Azure DevOps.
#
# Variáveis a definir em Pipelines > Edit > Variables:
#   GITHUB_REPO   destino, no formato usuario_ou_org/nome-do-repo  (ex.: aceleraai/acelera-bot-front)
#   GITHUB_PAT    token do GitHub com permissão de escrita no repo (secret)
#                 (fine-grained: Contents = Read and write; ou classic com escopo "repo")

trigger:
  branches:
    include: [main]

pool:
  vmImage: ubuntu-latest

steps:
  - checkout: self
    fetchDepth: 0                 # histórico completo (mirror não pode ser shallow)
    persistCredentials: false

  - script: |
      set -e
      git push --force "https://x-access-token:$(GITHUB_PAT)@github.com/$(GITHUB_REPO).git" HEAD:refs/heads/main
    displayName: 'Espelhar para o GitHub'
